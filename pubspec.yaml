name: garudasec
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  encrypt: ^5.0.3
  local_auth: ^2.3.0
  secure_application: ^4.0.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  pointycastle: ^3.9.1
  basic_utils: ^5.7.0
  lottie: ^3.3.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottiefiles/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
